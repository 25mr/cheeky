<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍺 Cheeky Pint</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f8fafc;
      color: #1e293b;
      min-height: 100vh;
    }
    .header {
      background: linear-gradient(135deg, #0F172A 0%, #1e293b 100%);
      padding: 44px 20px;
      text-align: center;
    }
    .header h1 { color: #fff; font-size: 28px; font-weight: 700; }
    .header p  { color: #94a3b8; font-size: 14px; margin-top: 8px; }
    .container { max-width: 640px; margin: 0 auto; padding: 32px 20px 48px; }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 16px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
      transition: box-shadow .2s;
    }
    .card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.1); }
    .card h2 { font-size: 17px; font-weight: 600; color: #111827; margin-bottom: 6px; line-height: 1.4; }
    .card .date { font-size: 13px; color: #6b7280; margin-bottom: 12px; }
    .card .summary { font-size: 14px; color: #374151; line-height: 1.6; }
    .empty { text-align: center; color: #94a3b8; padding: 60px 20px; font-size: 15px; }
    .footer {
      text-align: center;
      padding: 24px 20px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>🍺 Cheeky Pint</h1>
    <p>Latest episodes from John Collison</p>
  </div>

  <div class="container">
    <div id="episodes"><p class="empty">Loading …</p></div>
  </div>

  <div class="footer">
    Powered by GitHub Actions
  </div>

  <script>
    function escapeHtml(s) {
      var d = document.createElement('div');
      d.appendChild(document.createTextNode(s || ''));
      return d.innerHTML;
    }

    fetch('data.json')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var el = document.getElementById('episodes');
        if (!data || data.length === 0) {
          el.innerHTML = '<p class="empty">No episodes yet.</p>';
          return;
        }
        el.innerHTML = data.map(function(e) {
          return '<div class="card">'
            + '<h2>' + escapeHtml(e.title) + '</h2>'
            + '<p class="date">📅 ' + escapeHtml(e.date) + '</p>'
            + '<p class="summary">' + escapeHtml(e.summary) + '</p>'
            + '</div>';
        }).join('');
      })
      .catch(function() {
        document.getElementById('episodes').innerHTML =
          '<p class="empty">Failed to load episodes.</p>';
      });
  </script>

</body>
</html>
