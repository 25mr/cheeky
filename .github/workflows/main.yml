name: Cheeky Pint Weekly

on:
  schedule:
    - cron: "36 10 * * 0"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cheeky-pint-weekly
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      MAILEROO_API_KEY: ${{ secrets.MAILEROO_API_KEY }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run fetch/translate/send/update-pages
        run: |
          python scripts/run.py

      - name: Commit and push docs updates (GitHub Pages)
        run: |
          set -e
          if git status --porcelain | grep -E 'docs/' > /dev/null; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/data.json docs/index.html
            git commit -m "Update Cheeky Pint pages"
            git push
          else
            echo "No docs changes to commit."
          fi
